plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
    id "com.google.gms.google-services"
}

def keystoreProperties = new Properties()
def keystorePropertiesFile = rootProject.file("key.properties")
if (keystorePropertiesFile.exists()) {
    keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
}

def resolveMapsApiKey = {
    def envFile = rootProject.file("../../backend/.env")
    if (!envFile.exists()) return ""
    def key = ""
    envFile.eachLine { line ->
        def trimmed = line.trim()
        if (trimmed.startsWith("GOOGLE_MAPS_API_KEY=")) {
            key = trimmed.substring("GOOGLE_MAPS_API_KEY=".length()).trim()
            if (key.startsWith('"') && key.endsWith('"')) {
                key = key.substring(1, key.length() - 1)
            }
        }
    }
    return key
}

android {
    namespace = "com.liftoo.liftoo_mobile"
    compileSdk = flutter.compileSdkVersion
    ndkVersion = flutter.ndkVersion

    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_17
        targetCompatibility = JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = JavaVersion.VERSION_17.toString()
    }

    signingConfigs {
        release {
            keyAlias keystoreProperties["keyAlias"]
            keyPassword keystoreProperties["keyPassword"]
            storePassword keystoreProperties["storePassword"]
            storeFile keystoreProperties["storeFile"] ? rootProject.file(keystoreProperties["storeFile"]) : null
        }
    }

    defaultConfig {
        applicationId = "com.liftoo.liftoo_mobile"
        minSdk = flutter.minSdkVersion
        targetSdk = flutter.targetSdkVersion
        versionCode = flutter.versionCode
        versionName = flutter.versionName
        manifestPlaceholders += [googleMapsApiKey: resolveMapsApiKey()]
    }

    buildTypes {
        release {
            if (!keystorePropertiesFile.exists()) {
                throw new GradleException(
                    "Release builds require android/key.properties. " +
                    "Run: frontend/scripts/setup-playstore-keystore.ps1"
                )
            }
            signingConfig signingConfigs.release
            minifyEnabled = true
            shrinkResources = true
            proguardFiles(
                getDefaultProguardFile("proguard-android-optimize.txt"),
                "proguard-rules.pro"
            )
        }
    }
}

flutter {
    source = "../.."
}
